name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────
  # 1. Format check
  # ──────────────────────────────────────────────
  fmt:
    name: Format (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ──────────────────────────────────────────────
  # 2. Lint
  # ──────────────────────────────────────────────
  clippy:
    name: Lint (clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ──────────────────────────────────────────────
  # 3. Shared Phase 1 fixture
  # ──────────────────────────────────────────────
  hello-fixture:
    name: Build shared hello fixture
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-fixture-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-component
        run: cargo install cargo-component --locked --version 0.21.1
      - name: Build hello fixture once
        id: build
        shell: bash
        run: |
          wasm_path="$(scripts/build-hello-component.sh)"
          mkdir -p layer36-fixture
          cp "$wasm_path" layer36-fixture/hello_world.wasm
      - name: Record fixture hash
        id: hash
        shell: bash
        run: |
          sha256="$(sha256sum layer36-fixture/hello_world.wasm | awk '{print $1}')"
          printf '%s\n' "$sha256" > layer36-fixture/hello_world.wasm.sha256
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "hello fixture sha256: $sha256"
      - name: Upload hello fixture
        uses: actions/upload-artifact@v4
        with:
          name: phase1-hello-fixture
          path: layer36-fixture/
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # 4. Test matrix — Linux, macOS, Windows
  # ──────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: hello-fixture
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2, wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build workspace
        run: cargo build --workspace
      - name: Build release binary
        run: cargo build --release --workspace
      - name: Download shared hello fixture
        uses: actions/download-artifact@v4
        with:
          name: phase1-hello-fixture
          path: layer36-fixture
      - name: Run Phase 1 tests
        shell: bash
        env:
          LAYER36_HELLO_WASM: layer36-fixture/hello_world.wasm
          LAYER36_HELLO_SHA256: ${{ needs.hello-fixture.outputs.sha256 }}
        run: scripts/test-phase1.sh

  # ──────────────────────────────────────────────
  # 5. Documentation build
  # ──────────────────────────────────────────────
  docs:
    name: Docs (mdBook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p ~/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --directory ~/bin
          echo "$HOME/bin" >> $GITHUB_PATH
      - name: Build docs
        run: mdbook build docs/book

  # ──────────────────────────────────────────────
  # 6. Benchmark smoke + warning-only regression check
  # ──────────────────────────────────────────────
  benchmarks:
    name: Benchmarks (warning only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-component
        run: cargo install cargo-component --locked --version 0.21.1
      - name: Build Phase 1 benchmark components
        shell: bash
        run: scripts/build-phase1-components.sh
      - name: Run Phase 1 runtime benchmarks
        run: cargo bench -p layer36-runtime --bench startup
      - name: Check against recorded baseline
        if: always()
        run: scripts/check-benchmark-regression.sh

  # ──────────────────────────────────────────────
  # 7. Dependency audit (cargo-deny)
  # ──────────────────────────────────────────────
  deny:
    name: Dependency audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.4
      - name: Run cargo-deny
        run: cargo deny check advisories licenses bans sources
