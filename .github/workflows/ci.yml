name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      full:
        description: Run full cross-host CI, benchmarks, and dependency audit
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────
  # 1. Format check
  # ──────────────────────────────────────────────
  fmt:
    name: Format (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ──────────────────────────────────────────────
  # 2. Lint
  # ──────────────────────────────────────────────
  clippy:
    name: Lint (clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ──────────────────────────────────────────────
  # 3. Phase 2 binding checkpoint
  # ──────────────────────────────────────────────
  phase2-bindings:
    name: Phase 2 bindings
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-phase2-bindings-${{ hashFiles('**/Cargo.lock') }}
      - name: Generate and test Phase 2 Rust host bindings
        run: cargo test -p layer36-runtime --features phase2-bindings

  # ──────────────────────────────────────────────
  # 4. Fast Linux workspace test
  # ──────────────────────────────────────────────
  quick-test:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2, wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Run workspace tests
        run: cargo test --workspace --all-features

  # ──────────────────────────────────────────────
  # 5. Rust SDK package dry-run
  # ──────────────────────────────────────────────
  rust-sdk-package:
    name: Rust SDK package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-sdk-package-${{ hashFiles('**/Cargo.lock') }}
      - name: Package Rust SDK
        run: cargo package -p layer36

  # ──────────────────────────────────────────────
  # 6. UAPI contract and generated reference freshness
  # ──────────────────────────────────────────────
  uapi-reference:
    name: UAPI contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-uapi-reference-${{ hashFiles('**/Cargo.lock') }}
      - name: Check Phase 2 UAPI contract
        run: sh scripts/check-uapi.sh
      - name: Regenerate UAPI reference
        run: sh scripts/generate-uapi-reference.sh
      - name: Check generated UAPI reference is current
        run: git diff --exit-code -- docs/book/src/reference/uapi/index.md

  # ──────────────────────────────────────────────
  # 7. Shared component fixtures
  # ──────────────────────────────────────────────
  hello-fixture:
    name: Build shared component fixtures
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-fixture-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-component
        run: cargo install cargo-component --locked --version 0.21.1
      - name: Build hello fixture once
        id: build
        shell: bash
        run: |
          wasm_path="$(scripts/build-hello-component.sh)"
          mkdir -p layer36-fixture
          cp "$wasm_path" layer36-fixture/hello_world.wasm
      - name: Build Phase 2 smoke fixture once
        shell: bash
        run: |
          wasm_path="$(scripts/build-phase2-smoke-component.sh)"
          cp "$wasm_path" layer36-fixture/phase2_smoke.wasm
      - name: Build layer36-clock fixture once
        shell: bash
        run: |
          wasm_path="$(scripts/build-layer36-clock-component.sh)"
          cp "$wasm_path" layer36-fixture/layer36_clock.wasm
      - name: Build layer36-cat fixture once
        shell: bash
        run: |
          wasm_path="$(scripts/build-layer36-cat-component.sh)"
          cp "$wasm_path" layer36-fixture/layer36_cat.wasm
      - name: Build layer36-curl fixture once
        shell: bash
        run: |
          wasm_path="$(scripts/build-layer36-curl-component.sh)"
          cp "$wasm_path" layer36-fixture/layer36_curl.wasm
      - name: Check Phase 2 fixture imports
        shell: bash
        run: |
          scripts/check-component-imports.sh \
            layer36-fixture/phase2_smoke.wasm \
            layer36-fixture/layer36_clock.wasm \
            layer36-fixture/layer36_cat.wasm \
            layer36-fixture/layer36_curl.wasm
      - name: Record fixture hash
        id: hash
        shell: bash
        run: |
          sha256="$(sha256sum layer36-fixture/hello_world.wasm | awk '{print $1}')"
          printf '%s\n' "$sha256" > layer36-fixture/hello_world.wasm.sha256
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "hello fixture sha256: $sha256"
      - name: Upload component fixtures
        uses: actions/upload-artifact@v4
        with:
          name: phase-component-fixtures
          path: layer36-fixture/
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # 8. Full test matrix — Linux, macOS, Windows
  # ──────────────────────────────────────────────
  full-test:
    name: Full test (${{ matrix.os }})
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ${{ matrix.os }}
    needs: hello-fixture
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2, wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build workspace
        run: cargo build --workspace
      - name: Build release binary
        run: cargo build --release --workspace
      - name: Download shared component fixtures
        uses: actions/download-artifact@v4
        with:
          name: phase-component-fixtures
          path: layer36-fixture
      - name: Run Phase 1 tests
        shell: bash
        env:
          LAYER36_HELLO_WASM: layer36-fixture/hello_world.wasm
          LAYER36_HELLO_SHA256: ${{ needs.hello-fixture.outputs.sha256 }}
          LAYER36_PHASE2_SMOKE_WASM: layer36-fixture/phase2_smoke.wasm
          LAYER36_CLOCK_WASM: layer36-fixture/layer36_clock.wasm
          LAYER36_CAT_WASM: layer36-fixture/layer36_cat.wasm
          LAYER36_CURL_WASM: layer36-fixture/layer36_curl.wasm
        run: scripts/test-phase1.sh

  # ──────────────────────────────────────────────
  # 9. Documentation build
  # ──────────────────────────────────────────────
  docs:
    name: Docs (mdBook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p ~/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --directory ~/bin
          echo "$HOME/bin" >> $GITHUB_PATH
      - name: Build docs
        run: mdbook build docs/book
      - name: Check TypeScript SDK shape
        run: npm --prefix packages/sdk-ts run check:shape

  # ──────────────────────────────────────────────
  # 10. Benchmark smoke + warning-only regression check
  # ──────────────────────────────────────────────
  benchmarks:
    name: Benchmarks (warning only)
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-component
        run: cargo install cargo-component --locked --version 0.21.1
      - name: Build Phase 1 benchmark components
        shell: bash
        run: scripts/build-phase1-components.sh
      - name: Build Phase 2 benchmark components
        shell: bash
        run: |
          scripts/build-phase2-smoke-component.sh
          scripts/build-layer36-clock-component.sh
      - name: Run runtime startup benchmarks
        run: cargo bench -p layer36-runtime --bench startup
      - name: Run Phase 2 UAPI dispatch benchmarks
        run: cargo bench -p layer36-runtime --bench uapi_dispatch
      - name: Check against recorded baseline
        if: always()
        run: scripts/check-benchmark-regression.sh

  # ──────────────────────────────────────────────
  # 11. Dependency audit (cargo-deny)
  # ──────────────────────────────────────────────
  deny:
    name: Dependency audit (cargo-deny)
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.4
      - name: Run cargo-deny
        run: cargo deny check advisories licenses bans sources
