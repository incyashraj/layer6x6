name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────
  # 1. Format check
  # ──────────────────────────────────────────────
  fmt:
    name: Format (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ──────────────────────────────────────────────
  # 2. Lint
  # ──────────────────────────────────────────────
  clippy:
    name: Lint (clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ──────────────────────────────────────────────
  # 3. Test matrix — Linux, macOS, Windows
  # ──────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2, wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build workspace
        run: cargo build --workspace
      - name: Build release binary
        run: cargo build --release --workspace
      - name: Install cargo-component
        run: cargo install cargo-component --locked --version 0.21.1
      - name: Run Phase 1 tests
        shell: bash
        run: scripts/test-phase1.sh

  # ──────────────────────────────────────────────
  # 4. Documentation build
  # ──────────────────────────────────────────────
  docs:
    name: Docs (mdBook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p ~/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --directory ~/bin
          echo "$HOME/bin" >> $GITHUB_PATH
      - name: Build docs
        run: mdbook build docs/book

  # ──────────────────────────────────────────────
  # 5. Benchmark smoke + warning-only regression check
  # ──────────────────────────────────────────────
  benchmarks:
    name: Benchmarks (warning only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-component
        run: cargo install cargo-component --locked --version 0.21.1
      - name: Build Phase 1 benchmark components
        shell: bash
        run: scripts/build-phase1-components.sh
      - name: Run Phase 1 runtime benchmarks
        run: cargo bench -p layer36-runtime --bench startup
      - name: Check against recorded baseline
        if: always()
        run: scripts/check-benchmark-regression.sh

  # ──────────────────────────────────────────────
  # 6. Dependency audit (cargo-deny)
  # ──────────────────────────────────────────────
  deny:
    name: Dependency audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.4
      - name: Run cargo-deny
        run: cargo deny check advisories licenses bans sources
