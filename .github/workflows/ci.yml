name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      full:
        description: Run full cross-host CI, benchmarks, and dependency audit
        required: false
        type: boolean
        default: false
      language_variants_mode:
        description: Language-variant fixture mode (optional, any, both, go, ts)
        required: false
        type: string
        default: optional

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────
  # 1. Format check
  # ──────────────────────────────────────────────
  fmt:
    name: Format (rustfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ──────────────────────────────────────────────
  # 2. Lint
  # ──────────────────────────────────────────────
  clippy:
    name: Lint (clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ──────────────────────────────────────────────
  # 3. Phase 2 binding checkpoint
  # ──────────────────────────────────────────────
  phase2-bindings:
    name: Phase 2 bindings
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-phase2-bindings-${{ hashFiles('**/Cargo.lock') }}
      - name: Generate and test Phase 2 Rust host bindings
        run: cargo test -p layer36-runtime --features phase2-bindings

  # ──────────────────────────────────────────────
  # 4. Fast Linux workspace test
  # ──────────────────────────────────────────────
  quick-test:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2, wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Run workspace tests
        run: cargo test --workspace --all-features

  # ──────────────────────────────────────────────
  # 5. Rust SDK package dry-run
  # ──────────────────────────────────────────────
  rust-sdk-package:
    name: Rust SDK package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-sdk-package-${{ hashFiles('**/Cargo.lock') }}
      - name: Record Rust SDK evidence
        run: |
          mkdir -p layer36-evidence
          scripts/record-phase2-rust-sdk-evidence.sh \
            --strict \
            --output layer36-evidence/rust-sdk-evidence.md
      - name: Upload Rust SDK evidence
        uses: actions/upload-artifact@v4
        with:
          name: rust-sdk-evidence
          path: layer36-evidence/rust-sdk-evidence.md
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # 6. UAPI contract and generated reference freshness
  # ──────────────────────────────────────────────
  uapi-reference:
    name: UAPI contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-uapi-reference-${{ hashFiles('**/Cargo.lock') }}
      - name: Install wasm-tools
        run: cargo install wasm-tools --locked
      - name: Check Phase 2 UAPI contract
        run: sh scripts/check-uapi.sh
      - name: Regenerate UAPI reference
        run: sh scripts/generate-uapi-reference.sh
      - name: Check generated UAPI reference is current
        run: git diff --exit-code -- docs/book/src/reference/uapi/index.md
      - name: Regenerate UAPI freeze evidence
        run: sh scripts/generate-uapi-freeze-evidence.sh
      - name: Check generated UAPI freeze evidence is current
        run: git diff --exit-code -- docs/book/src/phase2/uapi-freeze-evidence.md
      - name: Regenerate UAPI freeze lock
        run: sh scripts/generate-uapi-freeze-lock.sh
      - name: Check generated UAPI freeze lock is current
        run: git diff --exit-code -- docs/book/src/phase2/uapi-freeze-lock.md
      - name: Check runtime adapter boundary
        run: sh scripts/check-adapter-boundary.sh
      - name: Check Phase 2 exit evidence
        run: sh scripts/check-phase2-exit-evidence.sh

  # ──────────────────────────────────────────────
  # 7. Shared component fixtures
  # ──────────────────────────────────────────────
  hello-fixture:
    name: Build shared component fixtures
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-fixture-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-component
        run: cargo install cargo-component --locked --version 0.21.1
      - name: Build hello fixture once
        id: build
        shell: bash
        run: |
          wasm_path="$(scripts/build-hello-component.sh)"
          mkdir -p layer36-fixture
          cp "$wasm_path" layer36-fixture/hello_world.wasm
      - name: Build Phase 2 smoke fixture once
        shell: bash
        run: |
          wasm_path="$(scripts/build-phase2-smoke-component.sh)"
          cp "$wasm_path" layer36-fixture/phase2_smoke.wasm
      - name: Build layer36-clock fixture once
        shell: bash
        run: |
          wasm_path="$(scripts/build-layer36-clock-component.sh)"
          cp "$wasm_path" layer36-fixture/layer36_clock.wasm
      - name: Build layer36-cat fixture once
        shell: bash
        run: |
          wasm_path="$(scripts/build-layer36-cat-component.sh)"
          cp "$wasm_path" layer36-fixture/layer36_cat.wasm
      - name: Build layer36-curl fixture once
        shell: bash
        run: |
          wasm_path="$(scripts/build-layer36-curl-component.sh)"
          cp "$wasm_path" layer36-fixture/layer36_curl.wasm
      - name: Check Phase 2 fixture imports
        shell: bash
        run: |
          scripts/check-component-imports.sh \
            layer36-fixture/phase2_smoke.wasm \
            layer36-fixture/layer36_clock.wasm \
            layer36-fixture/layer36_cat.wasm \
            layer36-fixture/layer36_curl.wasm
      - name: Record fixture hash
        id: hash
        shell: bash
        run: |
          sha256="$(sha256sum layer36-fixture/hello_world.wasm | awk '{print $1}')"
          printf '%s\n' "$sha256" > layer36-fixture/hello_world.wasm.sha256
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "hello fixture sha256: $sha256"
      - name: Upload component fixtures
        uses: actions/upload-artifact@v4
        with:
          name: phase-component-fixtures
          path: layer36-fixture/
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # 8. Full test matrix — Linux, macOS, Windows
  # ──────────────────────────────────────────────
  full-test:
    name: Full test (${{ matrix.os }})
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ${{ matrix.os }}
    needs: hello-fixture
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2, wasm32-unknown-unknown
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build workspace
        run: cargo build --workspace
      - name: Build release binary
        run: cargo build --release --workspace
      - name: Download shared component fixtures
        uses: actions/download-artifact@v4
        with:
          name: phase-component-fixtures
          path: layer36-fixture
      - name: Run Phase 1 tests
        shell: bash
        env:
          LAYER36_HELLO_WASM: layer36-fixture/hello_world.wasm
          LAYER36_HELLO_SHA256: ${{ needs.hello-fixture.outputs.sha256 }}
          LAYER36_PHASE2_SMOKE_WASM: layer36-fixture/phase2_smoke.wasm
          LAYER36_CLOCK_WASM: layer36-fixture/layer36_clock.wasm
          LAYER36_CAT_WASM: layer36-fixture/layer36_cat.wasm
          LAYER36_CURL_WASM: layer36-fixture/layer36_curl.wasm
        run: scripts/test-phase1.sh
      - name: Set up Node.js for TypeScript fixture lane
        uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Build Phase 2 language-variant fixtures
        shell: bash
        env:
          LAYER36_LANGUAGE_VARIANTS_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.language_variants_mode || 'ts' }}
          LAYER36_ALLOW_NPX_INSTALL: "1"
        run: scripts/build-phase2-language-variant-fixtures.sh
      - name: Run Phase 2 language-variant runtime tests
        shell: bash
        env:
          LAYER36_LANGUAGE_VARIANTS_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.language_variants_mode || 'ts' }}
        run: scripts/test-phase2-language-variants.sh
      - name: Record Phase 2 language-variant evidence
        shell: bash
        env:
          LAYER36_LANGUAGE_VARIANTS_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.language_variants_mode || 'ts' }}
        run: |
          mkdir -p layer36-evidence
          scripts/record-phase2-language-variant-evidence.sh \
            --mode "${LAYER36_LANGUAGE_VARIANTS_MODE}" \
            --strict \
            --output "layer36-evidence/language-variant-${{ matrix.os }}.md"
      - name: Upload language-variant evidence
        uses: actions/upload-artifact@v4
        with:
          name: language-variant-evidence-${{ matrix.os }}
          path: layer36-evidence/language-variant-${{ matrix.os }}.md
          if-no-files-found: error
      - name: Record Phase 2 UCap enforcement evidence
        shell: bash
        run: |
          mkdir -p layer36-evidence
          scripts/record-phase2-ucap-evidence.sh \
            --strict \
            --output "layer36-evidence/ucap-enforcement-${{ matrix.os }}.md"
      - name: Upload UCap enforcement evidence
        uses: actions/upload-artifact@v4
        with:
          name: ucap-enforcement-evidence-${{ matrix.os }}
          path: layer36-evidence/ucap-enforcement-${{ matrix.os }}.md
          if-no-files-found: error
      - name: Record Phase 2 adapter evidence
        shell: bash
        run: |
          mkdir -p layer36-evidence
          scripts/record-phase2-adapter-evidence.sh \
            --strict \
            --output "layer36-evidence/adapter-evidence-${{ matrix.os }}.md"
      - name: Upload adapter evidence
        uses: actions/upload-artifact@v4
        with:
          name: adapter-evidence-${{ matrix.os }}
          path: layer36-evidence/adapter-evidence-${{ matrix.os }}.md
          if-no-files-found: error
      - name: Record Phase 2 sample evidence
        shell: bash
        run: |
          mkdir -p layer36-evidence
          scripts/record-phase2-sample-evidence.sh \
            "layer36-evidence/sample-evidence-${{ matrix.os }}.md"
      - name: Upload sample evidence
        uses: actions/upload-artifact@v4
        with:
          name: sample-evidence-${{ matrix.os }}
          path: layer36-evidence/sample-evidence-${{ matrix.os }}.md
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # 9. Compare language-variant evidence across hosts
  # ──────────────────────────────────────────────
  language-variant-evidence-compare:
    name: Language variant evidence compare
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    needs: full-test
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Download Linux language-variant evidence
        uses: actions/download-artifact@v4
        with:
          name: language-variant-evidence-ubuntu-latest
          path: layer36-evidence/linux
      - name: Download macOS language-variant evidence
        uses: actions/download-artifact@v4
        with:
          name: language-variant-evidence-macos-latest
          path: layer36-evidence/macos
      - name: Download Windows language-variant evidence
        uses: actions/download-artifact@v4
        with:
          name: language-variant-evidence-windows-latest
          path: layer36-evidence/windows
      - name: Compare language-variant evidence reports
        shell: bash
        run: |
          scripts/compare-phase2-language-variant-evidence.sh \
            layer36-evidence/linux/language-variant-ubuntu-latest.md \
            layer36-evidence/macos/language-variant-macos-latest.md \
            layer36-evidence/windows/language-variant-windows-latest.md

  # ──────────────────────────────────────────────
  # 10. Compare UCap enforcement evidence across hosts
  # ──────────────────────────────────────────────
  ucap-enforcement-evidence-compare:
    name: UCap enforcement evidence compare
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    needs: full-test
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Download Linux UCap evidence
        uses: actions/download-artifact@v4
        with:
          name: ucap-enforcement-evidence-ubuntu-latest
          path: layer36-evidence/linux
      - name: Download macOS UCap evidence
        uses: actions/download-artifact@v4
        with:
          name: ucap-enforcement-evidence-macos-latest
          path: layer36-evidence/macos
      - name: Download Windows UCap evidence
        uses: actions/download-artifact@v4
        with:
          name: ucap-enforcement-evidence-windows-latest
          path: layer36-evidence/windows
      - name: Compare UCap enforcement evidence reports
        shell: bash
        run: |
          scripts/compare-phase2-ucap-evidence.sh \
            layer36-evidence/linux/ucap-enforcement-ubuntu-latest.md \
            layer36-evidence/macos/ucap-enforcement-macos-latest.md \
            layer36-evidence/windows/ucap-enforcement-windows-latest.md

  # ──────────────────────────────────────────────
  # 11. Compare adapter evidence across hosts
  # ──────────────────────────────────────────────
  adapter-evidence-compare:
    name: Adapter evidence compare
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    needs: full-test
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Download Linux adapter evidence
        uses: actions/download-artifact@v4
        with:
          name: adapter-evidence-ubuntu-latest
          path: layer36-evidence/linux
      - name: Download macOS adapter evidence
        uses: actions/download-artifact@v4
        with:
          name: adapter-evidence-macos-latest
          path: layer36-evidence/macos
      - name: Download Windows adapter evidence
        uses: actions/download-artifact@v4
        with:
          name: adapter-evidence-windows-latest
          path: layer36-evidence/windows
      - name: Compare adapter evidence reports
        shell: bash
        run: |
          scripts/compare-phase2-adapter-evidence.sh \
            layer36-evidence/linux/adapter-evidence-ubuntu-latest.md \
            layer36-evidence/macos/adapter-evidence-macos-latest.md \
            layer36-evidence/windows/adapter-evidence-windows-latest.md

  # ──────────────────────────────────────────────
  # 12. Compare sample evidence across hosts
  # ──────────────────────────────────────────────
  sample-evidence-compare:
    name: Sample evidence compare
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    needs: full-test
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Download Linux sample evidence
        uses: actions/download-artifact@v4
        with:
          name: sample-evidence-ubuntu-latest
          path: layer36-evidence/linux
      - name: Download macOS sample evidence
        uses: actions/download-artifact@v4
        with:
          name: sample-evidence-macos-latest
          path: layer36-evidence/macos
      - name: Download Windows sample evidence
        uses: actions/download-artifact@v4
        with:
          name: sample-evidence-windows-latest
          path: layer36-evidence/windows
      - name: Compare sample evidence reports
        shell: bash
        run: |
          scripts/compare-phase2-sample-evidence.sh \
            layer36-evidence/linux/sample-evidence-ubuntu-latest.md \
            layer36-evidence/macos/sample-evidence-macos-latest.md \
            layer36-evidence/windows/sample-evidence-windows-latest.md \
            --allow-blocked-curl

  # ──────────────────────────────────────────────
  # 13. Documentation build
  # ──────────────────────────────────────────────
  docs:
    name: Docs (mdBook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install mdBook
        run: |
          mkdir -p ~/bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --directory ~/bin
          echo "$HOME/bin" >> $GITHUB_PATH
      - name: Build docs
        run: mdbook build docs/book
      - name: Check TypeScript SDK shape
        run: npm --prefix packages/sdk-ts run check:shape
      - name: Check Go SDK shape
        run: node packages/sdk-go/scripts/check-shape.mjs

  # ──────────────────────────────────────────────
  # 14. Benchmark smoke + warning-only regression check
  # ──────────────────────────────────────────────
  benchmarks:
    name: Benchmarks (Phase 2 baseline, warning only)
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          targets: wasm32-wasip1, wasm32-wasip2
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
      - name: Install cargo-component
        run: cargo install cargo-component --locked --version 0.21.1
      - name: Build Phase 1 benchmark components
        shell: bash
        run: scripts/build-phase1-components.sh
      - name: Build Phase 2 benchmark components
        shell: bash
        run: |
          scripts/build-phase2-smoke-component.sh
          scripts/build-layer36-clock-component.sh
      - name: Run runtime startup benchmarks
        run: cargo bench -p layer36-runtime --bench startup
      - name: Run Phase 2 UAPI dispatch benchmarks
        run: cargo bench -p layer36-runtime --bench uapi_dispatch
      - name: Check against recorded baseline
        if: always()
        env:
          BENCH_BASELINE_FILES: ${{ github.workspace }}/docs/book/src/phase2/benchmark-baseline.json
          BENCH_REGRESSION_MODE: warn
          BENCH_REGRESSION_THRESHOLD_PCT: "10"
        run: scripts/check-benchmark-regression.sh

  # ──────────────────────────────────────────────
  # 15. Dependency audit (cargo-deny)
  # ──────────────────────────────────────────────
  deny:
    name: Dependency audit (cargo-deny)
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.full) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[full-ci]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --version 0.19.4
      - name: Run cargo-deny
        run: scripts/check-dependencies.sh
