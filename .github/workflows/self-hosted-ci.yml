name: Self-hosted CI

on:
  workflow_dispatch:
    inputs:
      language_variants_mode:
        description: Language-variant fixture mode (optional, any, both, go, ts)
        required: false
        type: string
        default: optional
      fuzz_max_total_time:
        description: Per-target fuzz duration in seconds
        required: false
        type: string
        default: "30"
      benchmark_regression_mode:
        description: Benchmark regression mode (warn or fail)
        required: false
        type: string
        default: warn
      benchmark_regression_threshold_pct:
        description: Benchmark regression threshold percentage
        required: false
        type: string
        default: "10"

concurrency:
  group: self-hosted-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  local-full-gate:
    name: Local full gate
    runs-on: [self-hosted, layer36-local]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1, wasm32-wasip2, wasm32-unknown-unknown

      - name: Install local CI tools
        shell: bash
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
          if ! command -v cargo-component >/dev/null 2>&1; then
            cargo install cargo-component --locked --version 0.21.1
          fi
          if ! command -v cargo-deny >/dev/null 2>&1; then
            cargo install cargo-deny --locked --version 0.19.4
          fi
          if ! command -v cargo-fuzz >/dev/null 2>&1; then
            cargo install cargo-fuzz --locked
          fi
          if ! command -v wasm-tools >/dev/null 2>&1; then
            cargo install wasm-tools --locked
          fi
          if ! rustup toolchain list | grep -q "^nightly"; then
            rustup toolchain install nightly --profile minimal
          fi
          if ! command -v mdbook >/dev/null 2>&1; then
            cargo install mdbook --locked --version 0.4.40
          fi

      - name: Format
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build component fixtures
        id: fixtures
        shell: bash
        run: |
          hello_path="$(scripts/build-hello-component.sh | tail -n 1)"
          phase2_smoke_path="$(scripts/build-phase2-smoke-component.sh | tail -n 1)"
          clock_path="$(scripts/build-layer36-clock-component.sh | tail -n 1)"
          cat_path="$(scripts/build-layer36-cat-component.sh | tail -n 1)"
          curl_path="$(scripts/build-layer36-curl-component.sh | tail -n 1)"
          printf 'hello=%s\n' "$hello_path" >> "$GITHUB_OUTPUT"
          printf 'phase2_smoke=%s\n' "$phase2_smoke_path" >> "$GITHUB_OUTPUT"
          printf 'clock=%s\n' "$clock_path" >> "$GITHUB_OUTPUT"
          printf 'cat=%s\n' "$cat_path" >> "$GITHUB_OUTPUT"
          printf 'curl=%s\n' "$curl_path" >> "$GITHUB_OUTPUT"

      - name: Check Phase 2 component imports
        run: |
          scripts/check-component-imports.sh \
            "${{ steps.fixtures.outputs.phase2_smoke }}" \
            "${{ steps.fixtures.outputs.clock }}" \
            "${{ steps.fixtures.outputs.cat }}" \
            "${{ steps.fixtures.outputs.curl }}"

      - name: Test workspace
        env:
          LAYER36_HELLO_WASM: ${{ steps.fixtures.outputs.hello }}
          LAYER36_PHASE2_SMOKE_WASM: ${{ steps.fixtures.outputs.phase2_smoke }}
          LAYER36_CLOCK_WASM: ${{ steps.fixtures.outputs.clock }}
          LAYER36_CAT_WASM: ${{ steps.fixtures.outputs.cat }}
          LAYER36_CURL_WASM: ${{ steps.fixtures.outputs.curl }}
        run: cargo test --workspace --all-features

      - name: Build Phase 2 language-variant fixtures
        env:
          LAYER36_LANGUAGE_VARIANTS_MODE: ${{ inputs.language_variants_mode }}
          LAYER36_ALLOW_NPX_INSTALL: "1"
          LAYER36_JCO_NPX_PACKAGE: "@bytecodealliance/jco@1.14.0"
        run: scripts/build-phase2-language-variant-fixtures.sh

      - name: Promote Phase 2 Go runtime fixtures when import-pure
        env:
          LAYER36_GO_RUNTIME_FIXTURE_MODE: optional
        run: scripts/promote-phase2-go-runtime-fixtures.sh

      - name: Test Phase 2 language variants
        env:
          LAYER36_LANGUAGE_VARIANTS_MODE: ${{ inputs.language_variants_mode }}
        run: scripts/test-phase2-language-variants.sh

      - name: Package Rust SDK
        run: LAYER36_OFFLINE=1 sh scripts/smoke-rust-sdk.sh

      - name: Check Rust SDK docs
        run: cargo doc -p layer36 --no-deps --offline

      - name: Check generated UAPI reference
        run: |
          LAYER36_OFFLINE=1 sh scripts/check-uapi.sh
          LAYER36_OFFLINE=1 sh scripts/generate-uapi-reference.sh
          git diff --exit-code -- docs/book/src/reference/uapi/index.md

      - name: Dependency audit
        run: scripts/check-dependencies.sh

      - name: Build benchmark fixtures
        run: scripts/build-phase1-components.sh

      - name: Run runtime startup benchmarks
        run: cargo bench -p layer36-runtime --bench startup

      - name: Run Phase 2 UAPI dispatch benchmarks
        run: cargo bench -p layer36-runtime --bench uapi_dispatch

      - name: Check benchmark regression (Phase 2 baseline)
        env:
          BENCH_BASELINE_FILES: ${{ github.workspace }}/docs/book/src/phase2/benchmark-baseline.json
          BENCH_REGRESSION_MODE: ${{ inputs.benchmark_regression_mode }}
          BENCH_REGRESSION_THRESHOLD_PCT: ${{ inputs.benchmark_regression_threshold_pct }}
        run: scripts/check-benchmark-regression.sh

      - name: Fuzz smoke
        env:
          RUSTUP_TOOLCHAIN: nightly
          LAYER36_FUZZ_MAX_TOTAL_TIME: ${{ inputs.fuzz_max_total_time }}
        run: scripts/run-phase2-fuzz-smoke.sh

      - name: Docs
        run: '"$HOME/.cargo/bin/mdbook" build docs/book'

      - name: Check TypeScript SDK shape
        run: npm --prefix packages/sdk-ts run check:shape

      - name: Check Go SDK shape
        run: node packages/sdk-go/scripts/check-shape.mjs
