[book]
title = "Layer36 Documentation"
authors = ["Layer36 contributors"]
language = "en"
multilingual = false
src = "src"

[output.html]
site-url = "/layer6x6/"
git-repository-url = "https://github.com/incyashraj/layer6x6"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/incyashraj/layer6x6/edit/main/docs/book/{path}"
no-section-label = false
additional-css = []

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 20
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
