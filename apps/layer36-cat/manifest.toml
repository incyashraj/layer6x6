[app]
id = "dev.layer36.cat"
name = "layer36-cat"
version = "0.1.0-dev"
entry = "target/wasm32-wasip1/release/layer36_cat.wasm"
world = "layer36:app/cli@0.1.0"

[[capabilities]]
cap = "io.args"
rationale = "Read file paths passed after the app separator"
required = true

[[capabilities]]
cap = "io.stdout"
rationale = "Print file contents"
required = true

[[capabilities]]
cap = "io.stderr"
rationale = "Print usage and file errors"
required = true

[[capabilities]]
cap = "fs.read:./fixtures/**"
rationale = "Read test fixture files"
required = true
