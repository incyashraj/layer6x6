[app]
id = "dev.layer36.curl"
name = "layer36-curl"
version = "0.1.0-dev"
entry = "target/wasm32-wasip1/release/layer36_curl.wasm"
world = "layer36:app/cli@0.1.0"

[[capabilities]]
cap = "io.args"
rationale = "Read the URL passed after the app separator"
required = true

[[capabilities]]
cap = "io.stdout"
rationale = "Print the response body"
required = true

[[capabilities]]
cap = "io.stderr"
rationale = "Print usage and network errors"
required = true

[[capabilities]]
cap = "net.connect:127.0.0.1:80"
rationale = "Example localhost HTTP grant; tests override the port"
required = true
