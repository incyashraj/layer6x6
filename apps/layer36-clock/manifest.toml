[app]
id = "dev.layer36.clock"
name = "layer36-clock"
version = "0.1.0-dev"
entry = "target/wasm32-wasip1/release/layer36_clock.wasm"
world = "layer36:app/cli@0.1.0"

[[capabilities]]
cap = "io.stdout"
rationale = "Print the formatted clock output"
required = true

[[capabilities]]
cap = "time.clock"
rationale = "Read the current wall-clock time"
required = true

[[capabilities]]
cap = "locale.info"
rationale = "Read the user's locale and timezone"
required = true

[[capabilities]]
cap = "locale.format"
rationale = "Format the timestamp through the host locale adapter"
required = true
